<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DateLight</title>
  <meta name="description" content="Find the perfect date spot in under 60 seconds.">
  <meta name="theme-color" content="#1C1C1E">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="bg-[#F7F5F2] text-[#1C1C1E] min-h-screen">

  <!-- Header -->
  <header class="px-6 pt-5 pb-4 max-w-2xl mx-auto">
    <h1>
      <img
        src="/src/assets/icons/DateLight_logo.png"
        alt="DateLight"
        class="h-12 w-auto"
      />
    </h1>
    <p class="mt-1 text-sm text-[#1C1C1E]/50 font-light">A little spark goes a long way.</p>
  </header>

  <!-- Search Panel -->
  <main class="px-6 max-w-2xl mx-auto space-y-4 pb-24">

    <!-- Map (animates in on search) -->
    <section id="map-section">
      <div id="map"></div>
    </section>

    <!-- Results Area (animates in on search) -->
    <section id="results-area">
      <div class="results-inner space-y-3">
        <div class="flex items-center justify-between">
          <div>
            <h2 id="results-heading" class="text-xl font-semibold">Nearby spots</h2>
            <button id="view-toggle-btn" class="view-toggle-btn hidden"></button>
          </div>
        </div>
        <div id="results-list" class="space-y-3">
          <!-- Venue cards injected here by ui.js -->
        </div>
      </div>
    </section>

    <!-- Location Input -->
    <section class="card" id="search-panel">

      <!-- First-run tutorial tip — hidden after first search -->
      <div id="onboarding-hint" class="onboarding-hint">
        <svg class="onboarding-bulb" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M10 1a6 6 0 00-3.815 10.631C7.237 12.5 8 13.443 8 14.456v.644a.75.75 0 00.572.729 6.016 6.016 0 002.856 0A.75.75 0 0012 15.1v-.644c0-1.013.762-1.957 3.815-2.825A6 6 0 0010 1zM8.863 17.414a.75.75 0 00-.226 1.483 9.066 9.066 0 002.726 0 .75.75 0 00-.226-1.483 7.553 7.553 0 01-2.274 0z" />
        </svg>
        Pick a neighborhood, set your vibe, and we'll find 3 perfect spots.
      </div>

      <label class="label" for="location-input">Where are you?</label>
      <div class="input-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9.69 18.933l.003.001C9.89 19.02 10 19 10 19s.11.02.308-.066l.002-.001.006-.003.018-.008a5.741 5.741 0 00.281-.14c.186-.096.446-.24.757-.433.62-.384 1.445-.966 2.274-1.765C15.302 14.988 17 12.493 17 9A7 7 0 103 9c0 3.492 1.698 5.988 3.355 7.584a13.731 13.731 0 002.273 1.765 11.842 11.842 0 00.976.544l.062.029.018.008.006.003zM10 11.25a2.25 2.25 0 100-4.5 2.25 2.25 0 000 4.5z" clip-rule="evenodd" />
        </svg>
        <input
          id="location-input"
          type="text"
          class="input-field"
          placeholder="Address, neighborhood, or city"
          autocomplete="off"
        />
      </div>
      <button id="use-location-btn" class="btn-ghost mt-3">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm.75-13a.75.75 0 00-1.5 0v4.59L7.3 7.64a.75.75 0 00-1.1 1.02l3.25 3.5a.75.75 0 001.1 0l3.25-3.5a.75.75 0 10-1.1-1.02l-1.95 2.1V5z" clip-rule="evenodd" />
        </svg>
        Use my location
      </button>
    </section>

    <!-- Radius Slider -->
    <section class="card">
      <div class="flex items-center justify-between mb-3">
        <label class="label mb-0" for="radius-slider">Scatter radius</label>
        <span class="radius-badge">
          <span id="radius-value">1.25</span> mi
        </span>
      </div>
      <input
        id="radius-slider"
        type="range"
        min="0.25"
        max="10"
        step="0.25"
        value="1.25"
        class="radius-slider"
      />
      <div class="flex justify-between mt-1 text-xs text-[#1C1C1E]/30">
        <span>0.25 mi</span>
        <span>10 mi</span>
      </div>
    </section>

    <!-- Filters -->
    <section class="card" id="filters-section">
      <p class="label">Set the mood</p>

      <!-- When? — collapsible Day + Time -->
      <button class="when-summary" id="when-summary" type="button">
        <span class="when-label">When?</span>
        <span id="when-display" class="when-display">Tap to set</span>
        <svg id="when-chevron" class="when-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/>
        </svg>
      </button>

      <div id="when-pills" class="when-pills-container">
        <div class="filter-group">
          <span class="filter-label">Day</span>
          <div class="filter-pills">
            <button class="filter-pill" data-group="day" data-value="tonight">Tonight</button>
            <button class="filter-pill" data-group="day" data-value="friday">Fri</button>
            <button class="filter-pill" data-group="day" data-value="saturday">Sat</button>
            <button class="filter-pill" data-group="day" data-value="sunday">Sun</button>
            <button class="filter-pill" data-group="day" data-value="monday">Mon</button>
            <button class="filter-pill" data-group="day" data-value="tuesday">Tue</button>
            <button class="filter-pill" data-group="day" data-value="wednesday">Wed</button>
            <button class="filter-pill" data-group="day" data-value="thursday">Thu</button>
          </div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Time</span>
          <div class="filter-pills">
            <button class="filter-pill" data-group="time" data-value="afternoon">Afternoon</button>
            <button class="filter-pill" data-group="time" data-value="evening">Evening</button>
            <button class="filter-pill" data-group="time" data-value="late-night">Late night</button>
          </div>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Vibe</span>
        <div class="filter-pills">
          <button class="filter-pill" data-group="vibe" data-value="romantic">Romantic</button>
          <button class="filter-pill" data-group="vibe" data-value="casual">Casual</button>
          <button class="filter-pill" data-group="vibe" data-value="trendy">Trendy</button>
          <button class="filter-pill" data-group="vibe" data-value="fancy">Fancy</button>
          <button class="filter-pill" data-group="vibe" data-value="gritty">Gritty</button>
          <button class="filter-pill" data-group="vibe" data-value="mix">Mix</button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Budget</span>
        <div class="filter-pills">
          <button class="filter-pill" data-group="budget" data-value="$">$</button>
          <button class="filter-pill" data-group="budget" data-value="$$">$$</button>
          <button class="filter-pill" data-group="budget" data-value="$$$">$$$</button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Type</span>
        <div class="filter-pills">
          <button class="filter-pill" data-group="type" data-value="dinner">Dinner</button>
          <button class="filter-pill" data-group="type" data-value="drinks">Drinks</button>
          <button class="filter-pill" data-group="type" data-value="coffee">Coffee</button>
          <button class="filter-pill" data-group="type" data-value="activity">Activity</button>
        </div>
      </div>

      <button id="filters-update-btn" class="filters-update-btn hidden">
        Update picks
      </button>
    </section>

    <!-- Search Button -->
    <button id="search-btn" class="btn-primary w-full">
      Find date spots
    </button>

  </main>

  <script src="/api/config"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
